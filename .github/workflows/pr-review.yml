name: AI PR Review

on:
  pull_request_target:
    types: [opened, synchronize, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  remove-label-on-push:
    if: >-
      github.event.action == 'synchronize' &&
      github.event.pull_request.head.repo.full_name != github.repository &&
      contains(github.event.pull_request.labels.*.name, 'safe-to-review')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Remove safe-to-review label on new push from fork
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --remove-label "safe-to-review"

  review:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (
        (github.event.pull_request.head.repo.full_name == github.repository && github.event.action != 'labeled') ||
        (github.event.action == 'labeled' && github.event.label.name == 'safe-to-review')
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Python file changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD -- '*.py' | head -1)
          if [ -n "$CHANGED" ]; then
            echo "python_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "python_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore code graph cache
        if: steps.changes.outputs.python_changed == 'true'
        uses: actions/cache@v4
        with:
          path: .code-review-graph/
          key: code-graph-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            code-graph-

      - name: Build code knowledge graph
        if: steps.changes.outputs.python_changed == 'true'
        continue-on-error: true
        run: |
          pip install cicaddy[graph]
          cicaddy graph-context \
            --base-ref origin/${{ github.event.pull_request.base.ref }} \
            --update -o workspace/graph_context.json

      - uses: redhat-community-ai-tools/cicaddy-action@v0.3.1
        with:
          ai_provider: gemini
          ai_model: gemini-3-flash-preview
          ai_api_key: ${{ secrets.AI_API_KEY }}
          task_file: ${{ steps.changes.outputs.python_changed == 'true' && 'tasks/pr_review_with_graph.yml' || 'tasks/pr_review.yml' }}
          mcp_servers_config: >-
            ${{ secrets.CONTEXT7_API_KEY != '' &&
              format('[{{"name":"Context7","protocol":"http","endpoint":"https://mcp.context7.com/mcp","headers":{{"CONTEXT7_API_KEY":"{0}"}},"timeout":300,"idle_timeout":60}}]', secrets.CONTEXT7_API_KEY) ||
              '[]' }}
          post_pr_comment: 'true'
