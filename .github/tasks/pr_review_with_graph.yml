name: pr_code_review_with_graph
description: "AI code review with code knowledge graph context for structural impact analysis"
type: code_review
version: "1.0"

inputs:
  - name: pr_title
    description: "Pull request title"
    required: true
  - name: pr_description
    description: "Pull request description"
    required: false
  - name: pr_author
    description: "Author of the pull request"
    required: false
  - name: target_branch
    description: "Target branch for the merge"
    required: false
  - name: source_branch
    description: "Source branch being merged"
    required: false
  - name: diff_content
    description: "The code diff to review"
    required: true
    format: diff
  - name: graph_context
    description: "Code knowledge graph blast-radius analysis and review guidance"
    required: false
    source: file
    path: workspace/graph_context.json
    format: json
  - name: review_focus
    env_var: ANALYSIS_FOCUS
    default: "general"
    description: "Focus area (security, performance, maintainability, general)"
    required: false

outputs:
  - name: summary
    description: "Brief summary of changes and overall assessment"
    required: true
    format: paragraph
  - name: structural_impact
    description: "Analysis of blast radius and structural impact from code graph"
    required: true
    format: table
  - name: issues
    description: "Identified issues, bugs, or concerns"
    required: true
    format: list
  - name: security_concerns
    description: "Security vulnerabilities or risks"
    required: false
    format: list
  - name: recommendations
    description: "Actionable recommendations for improvement"
    required: true
    format: list
  - name: code_quality
    description: "Code quality, readability, and maintainability assessment"
    required: false
    format: paragraph

tools:
  servers: []
  required_tools: []
  forbidden_tools: []

constraints:
  - Use the code knowledge graph context to understand the blast radius before reviewing the diff
  - Report the structural impact — how many files and functions are affected by the changes
  - Flag any changed functions that lack test coverage (identified in graph review_guidance)
  - Prioritize issues in high-impact areas (functions with many callers or inheritors)
  - Note when changes cross module boundaries (impacted files in different directories)
  - Focus on actionable feedback that improves code quality
  - Prioritize issues by severity (Critical > High > Medium > Low)
  - Provide specific line references when identifying issues
  - Suggest concrete fixes, not just identify problems
  - Consider the context and purpose of the changes
  - Avoid nitpicking style issues unless they impact readability
  - Be constructive and respectful in feedback
  - Check for common security vulnerabilities (injection, auth, data exposure)
  - Verify error handling and edge cases
  - Assess test coverage implications

reasoning: chain_of_thought
output_format: markdown

context: |
  You are reviewing a pull request for cicaddy-gitlab, a GitLab platform plugin
  for the cicaddy AI agent library. The project provides merge request analysis,
  branch review, GitLab API integration, and reusable GitLab CI templates.

  You have been provided with a **code knowledge graph analysis** that includes:
  - **Blast radius**: Which functions, classes, and files are structurally impacted
    by the changes (callers, callees, inheritors, tests)
  - **Source snippets**: Relevant code around the changed functions
  - **Review guidance**: Flags for untested changes, wide blast radius, and
    inheritance impacts

  Your goal is to:
  1. Review the blast radius to understand the structural impact of the changes
  2. Identify bugs, security issues, and potential problems in the diff
  3. Flag any impacted code paths that may need attention but are not in the diff
  4. Assess whether existing tests cover the changed and impacted code paths
  5. Suggest improvements for code quality and maintainability
  6. Provide actionable, specific feedback

  Start your review by summarizing the structural impact from the code graph,
  then proceed with the detailed code review.
